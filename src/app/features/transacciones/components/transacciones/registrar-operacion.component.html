<div class="page-container">
  <div class="register-card">

    <div class="logo-placeholder">OrionInc</div>
    <h2 class="form-title">Registrar Operación</h2>
    <p class="form-subtitle">Ingrese los datos para procesar la transacción segura</p>

    <div *ngIf="mensajeExito()" class="alert alert-success">{{ mensajeExito() }}</div>
    <div *ngIf="mensajeError()" class="alert alert-error">{{ mensajeError() }}</div>

    <form (ngSubmit)="onSubmit()" #operacionForm="ngForm">

      <div class="form-group">
        <label for="operacion">Operación</label>
        <input
          type="text"
          id="operacion"
          name="operacion"
          [(ngModel)]="transaccion().operacion"
          required
          placeholder="Ej. TRANSFERENCIA_SPEI"
          #operacionInput="ngModel"
          [class.input-error]="operacionInput.invalid && operacionInput.touched">
      </div>

      <div class="form-group">
        <label for="importe">Importe</label>
        <input
          type="number"
          id="importe"
          name="importe"
          [(ngModel)]="transaccion().importe"
          required
          min="0.01"
          placeholder="0.00"
          #importeInput="ngModel"
          [class.input-error]="importeInput.invalid && importeInput.touched">
      </div>

      <div class="form-group">
        <label for="cliente">Cliente</label>
        <input
          type="text"
          id="cliente"
          name="cliente"
          [(ngModel)]="transaccion().cliente"
          required
          placeholder="Nombre o ID del cliente"
          #clienteInput="ngModel"
          [class.input-error]="clienteInput.invalid && clienteInput.touched">
      </div>

      <div class="form-group">
        <label for="secreto">Secreto Técnico</label>
        <input
          type="password"
          id="secreto"
          name="secreto"
          [(ngModel)]="transaccion().secreto"
          required
          placeholder="••••••••••••••••"
          #secretoInput="ngModel"
          [class.input-error]="secretoInput.invalid && secretoInput.touched">
      </div>

      <button
        type="submit"
        class="btn-entrar"
        [disabled]="operacionForm.invalid || cargando()">
        {{ cargando() ? 'Procesando con API 2...' : 'Procesar Transacción' }}
      </button>

    </form>
  </div>
</div>
