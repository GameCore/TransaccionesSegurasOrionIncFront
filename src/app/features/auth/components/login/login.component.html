<div class="contenedor-login">
  <div class="tarjeta-login">
    <div class="logo-placeholder">orion</div>
    <div class="logo-placeholder">innovation</div>
    <h3>Control de Transacciones</h3>
    <p class="subtitulo">Inicie sesión con sus credenciales</p>

    @if (errorMsg()) {
      <div class="alerta-error">
        {{ errorMsg() }}
      </div>
    }

    <form [formGroup]="formularioLogin" (ngSubmit)="ejecutarLogin()">
      <div class="grupo-control">
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="ej. admin"
          [class.invalido]="formularioLogin.get('username')?.touched && formularioLogin.get('username')?.invalid"
        />
      </div>

      <div class="grupo-control">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.invalido]="formularioLogin.get('password')?.touched && formularioLogin.get('password')?.invalid"
        />
      </div>

      <button type="submit" [disabled]="cargando()" class="btn-entrar">
        {{ cargando() ? 'Verificando firma RSA...' : 'Acceder al Sistema' }}
      </button>
    </form>
  </div>
</div>
